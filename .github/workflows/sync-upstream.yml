name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 6"

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check upstream latest release
        id: upstream_release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          latest_release_tag="$(curl -fsSL https://api.github.com/repos/Wei-Shaw/sub2api/releases/latest | jq -r .tag_name)"
          if [[ -z "$latest_release_tag" || "$latest_release_tag" == "null" ]]; then
            echo "No upstream release tag found."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$latest_release_tag" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$latest_release_tag" >/dev/null; then
            echo "Latest upstream release $latest_release_tag already exists locally. Skipping sync."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream release detected: $latest_release_tag"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream repository
        if: steps.upstream_release.outputs.should_run == 'true'
        shell: bash
        run: |
          rm -rf /tmp/upstream-sub2api
          git clone https://github.com/Wei-Shaw/sub2api.git /tmp/upstream-sub2api

      - name: Sync upstream files while keeping FreeBSD automation
        if: steps.upstream_release.outputs.should_run == 'true'
        shell: bash
        run: |
          rsync -a --delete /tmp/upstream-sub2api/ ./ \
            --exclude '.git/' \
            --exclude '.github/workflows/' \
            --exclude 'scripts/package-freebsd.sh'

      - name: Commit synced changes
        if: steps.upstream_release.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No upstream changes to commit."
            exit 0
          fi
          git commit -m "chore: sync upstream"

      - name: Push sync commit
        if: steps.upstream_release.outputs.should_run == 'true'
        shell: bash
        run: |
          git push origin HEAD:main

      - name: Create and push upstream release tag
        if: steps.upstream_release.outputs.should_run == 'true' && steps.upstream_release.outputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.upstream_release.outputs.tag }}"
          git push origin "refs/tags/${{ steps.upstream_release.outputs.tag }}"

      - name: Trigger FreeBSD build for new release tag
        if: steps.upstream_release.outputs.should_run == 'true' && steps.upstream_release.outputs.tag != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-freebsd.yml/dispatches \
            -d "{\"ref\":\"${{ steps.upstream_release.outputs.tag }}\"}"
